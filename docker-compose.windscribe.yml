version: '3.8'

services:
  casehugbot:
    build:
      context: .
      dockerfile: Dockerfile.windscribe
    container_name: casehugauto_windscribe
    privileged: true  # Necesar pentru VPN
    cap_add:
      - NET_ADMIN  # Permisiuni pentru VPN
    environment:
      - DISPLAY=:99
      - WINDSCRIBE_USERNAME=${WINDSCRIBE_USERNAME}
      - WINDSCRIBE_PASSWORD=${WINDSCRIBE_PASSWORD}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./cookies_cont1.json:/app/cookies_cont1.json:ro
      - ./cookies_cont2.json:/app/cookies_cont2.json:ro
      - ./cookies_cont3.json:/app/cookies_cont3.json:ro
      - ./cookies_cont4.json:/app/cookies_cont4.json:ro
      - ./profiles:/app/profiles
      - ./debug_output:/app/debug_output
    restart: unless-stopped
