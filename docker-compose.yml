services:
  # FlareSolverr pentru bypass Cloudflare
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Bucharest
    ports:
      - "8191:8191"
    restart: unless-stopped
    networks:
      - casehug-network
  
  # Bot Casehug cu Nodriver
  casehugbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casehugauto
    restart: unless-stopped
    depends_on:
      - flaresolverr
    
    # Volumes pentru persistență date
    volumes:
      - ./profiles:/app/profiles
      - ./config.json:/app/config.json:ro
      - ./cookies_cont1.json:/app/cookies_cont1.json:ro  # Cookie-uri Cont 1
      - ./cookies_cont2.json:/app/cookies_cont2.json:ro  # Cookie-uri Cont 2
      - ./cookies_cont3.json:/app/cookies_cont3.json:ro  # Cookie-uri Cont 3
      - ./cookies_cont4.json:/app/cookies_cont4.json:ro  # Cookie-uri Cont 4
      - ./debug_output:/app/debug_output
    
    # Variabile de mediu
    environment:
      - TZ=Europe/Bucharest
      - PYTHONUNBUFFERED=1
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
    
    # Limită resurse (opțional)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    
    # Network
    networks:
      - casehug-network
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  casehug-network:
    driver: bridge
